<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="60%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
  </defs>

  <!-- background with rounded corners (iOS-style) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- subtle radial glow -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- equalizer / audio wave bars -->
  <g fill="url(#wave)">
    <!-- bar widths 36, gap 24, total 5 bars = 36*5 + 24*4 = 276, centered around x=256 → start x=118 -->
    <rect x="118" y="216" width="36" height="80"  rx="18"/>
    <rect x="178" y="166" width="36" height="180" rx="18"/>
    <rect x="238" y="126" width="36" height="260" rx="18"/>
    <rect x="298" y="156" width="36" height="200" rx="18"/>
    <rect x="358" y="196" width="36" height="120" rx="18"/>
  </g>

  <!-- AI sparkle (4-point star) top-right of waves -->
  <g transform="translate(396 130)" fill="url(#spark)">
    <path d="M0 -42 C 6 -14, 14 -6, 42 0 C 14 6, 6 14, 0 42 C -6 14, -14 6, -42 0 C -14 -6, -6 -14, 0 -42 Z"/>
  </g>
  <!-- small sparkle bottom-left -->
  <g transform="translate(98 380) scale(0.45)" fill="url(#spark)" opacity="0.9">
    <path d="M0 -42 C 6 -14, 14 -6, 42 0 C 14 6, 6 14, 0 42 C -6 14, -14 6, -42 0 C -14 -6, -6 -14, 0 -42 Z"/>
  </g>
</svg>
